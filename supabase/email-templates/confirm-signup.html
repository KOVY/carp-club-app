<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Potvrzení registrace - Carp Club ČR</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #0F172A;">
  <table role="presentation" style="width: 100%; border-collapse: collapse;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" style="width: 100%; max-width: 520px; border-collapse: collapse;">

          <!-- Logo a header -->
          <tr>
            <td align="center" style="padding-bottom: 32px;">
              <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #0D9488 0%, #14B8A6 100%); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center;">
                <span style="font-size: 40px;">🐟</span>
              </div>
              <h1 style="margin: 16px 0 0 0; font-size: 28px; font-weight: 700; color: #F8FAFC;">
                Carp Club ČR
              </h1>
            </td>
          </tr>

          <!-- Hlavní karta -->
          <tr>
            <td>
              <table role="presentation" style="width: 100%; border-collapse: collapse; background: #1E293B; border-radius: 16px; overflow: hidden;">

                <!-- Barevný proužek nahoře -->
                <tr>
                  <td style="height: 4px; background: linear-gradient(90deg, #0D9488 0%, #14B8A6 50%, #F97316 100%);"></td>
                </tr>

                <!-- Obsah -->
                <tr>
                  <td style="padding: 40px 32px;">
                    <h2 style="margin: 0 0 16px 0; font-size: 24px; font-weight: 600; color: #F8FAFC; text-align: center;">
                      Potvrďte svůj email
                    </h2>

                    <p style="margin: 0 0 24px 0; font-size: 16px; line-height: 1.6; color: #CBD5E1; text-align: center;">
                      Děkujeme za registraci do Carp Club ČR! Pro dokončení registrace klikněte na tlačítko níže.
                    </p>

                    <!-- CTA tlačítko -->
                    <table role="presentation" style="width: 100%; border-collapse: collapse;">
                      <tr>
                        <td align="center" style="padding: 8px 0 24px 0;">
                          <a href="{{ .ConfirmationURL }}"
                             style="display: inline-block; padding: 16px 48px; background: linear-gradient(135deg, #0D9488 0%, #14B8A6 100%); color: #FFFFFF; text-decoration: none; font-size: 18px; font-weight: 600; border-radius: 12px; box-shadow: 0 4px 14px rgba(13, 148, 136, 0.4);">
                            Potvrdit email
                          </a>
                        </td>
                      </tr>
                    </table>

                    <!-- Poznámka -->
                    <p style="margin: 0; font-size: 14px; line-height: 1.5; color: #94A3B8; text-align: center;">
                      Odkaz je platný 24 hodin. Pokud jste se neregistrovali, tento email ignorujte.
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Patička -->
          <tr>
            <td style="padding-top: 32px; text-align: center;">
              <p style="margin: 0 0 8px 0; font-size: 14px; color: #64748B;">
                Carp Club ČR - Kaprařské závody online
              </p>
              <p style="margin: 0; font-size: 12px; color: #475569;">
                <a href="https://carpclub.app" style="color: #0D9488; text-decoration: none;">carpclub.app</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
