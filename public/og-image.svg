<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="50%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="fishGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#FB923C"/>
    </linearGradient>
  </defs>

  <!-- Pozadí -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Dekorativní vlnky -->
  <g opacity="0.15">
    <path d="M0 500 Q300 460 600 500 Q900 540 1200 500 L1200 630 L0 630 Z" fill="#0D9488"/>
    <path d="M0 530 Q300 490 600 530 Q900 570 1200 530 L1200 630 L0 630 Z" fill="#0D9488"/>
  </g>

  <!-- Kapr vlevo -->
  <g transform="translate(80, 180) scale(0.7)">
    <path d="M360 116 C360 116 340 40 260 40 C180 40 140 80 100 100 C60 120 20 116 20 116 C20 116 60 140 100 160 C140 180 180 200 260 200 C340 200 360 124 360 124 L400 80 L400 160 L360 116Z"
          fill="url(#fishGrad)" opacity="0.95"/>
    <path d="M200 40 C220 10 280 10 300 40" stroke="url(#accentGrad)" stroke-width="12" fill="none" stroke-linecap="round"/>
    <circle cx="120" cy="100" r="16" fill="#0F172A"/>
    <circle cx="124" cy="96" r="6" fill="#F8FAFC"/>
    <path d="M160 80 Q200 100 160 120" stroke="#0F172A" stroke-width="3" fill="none" opacity="0.3"/>
    <path d="M200 70 Q240 100 200 130" stroke="#0F172A" stroke-width="3" fill="none" opacity="0.3"/>
    <path d="M240 65 Q280 100 240 135" stroke="#0F172A" stroke-width="3" fill="none" opacity="0.3"/>
  </g>

  <!-- Text -->
  <text x="480" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#F8FAFC">
    Carp Club
  </text>
  <text x="480" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#0D9488">
    CR
  </text>
  <text x="480" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94A3B8">
    Kaprarske zavody online
  </text>

  <!-- URL dole -->
  <text x="600" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#64748B" text-anchor="middle">
    carpclub.app
  </text>
