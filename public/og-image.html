<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      position: relative;
      overflow: hidden;
    }
    .bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.85) 0%, rgba(15, 23, 42, 0.6) 50%, rgba(15, 23, 42, 0.75) 100%);
    }
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      color: white;
    }
    .logo {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #0D9488 0%, #14B8A6 100%);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      box-shadow: 0 20px 40px rgba(13, 148, 136, 0.4);
    }
    .logo span {
      font-size: 60px;
    }
    h1 {
      font-size: 72px;
      font-weight: 800;
      margin-bottom: 16px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    h1 .highlight {
      color: #14B8A6;
    }
    .tagline {
      font-size: 32px;
      color: #CBD5E1;
      margin-bottom: 40px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .features {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 16px 24px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .feature-icon {
      font-size: 28px;
    }
    .feature-text {
      font-size: 20px;
      font-weight: 500;
    }
    .url {
      position: absolute;
      bottom: 40px;
      font-size: 24px;
      color: #F97316;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <img class="bg" src="og-fishing-bg.jpg" alt="">
  <div class="overlay"></div>
  <div class="content">
    <div class="logo">
      <span>🐟</span>
    </div>
    <h1>Carp Club <span class="highlight">ČR</span></h1>
    <p class="tagline">Kaprařské závody online</p>
    <div class="features">
      <div class="feature">
        <span class="feature-icon">📸</span>
        <span class="feature-text">Úlovky s fotkami</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🏆</span>
        <span class="feature-text">Živý leaderboard</span>
      </div>
      <div class="feature">
        <span class="feature-icon">✅</span>
        <span class="feature-text">Ověření úlovků</span>
      </div>
    </div>
    <span class="url">carpclub.app</span>
  </div>
</body>
</html>
